name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
            arch: arm64
          - os: macos-13
            target: darwin-x64
            arch: x64
          - os: ubuntu-latest
            target: linux-x64
            arch: x64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun build ./src/cli.ts --compile --target=bun-${{ matrix.target }} --outfile dist/asset-forge-${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: asset-forge-${{ matrix.target }}
          path: dist/asset-forge-${{ matrix.target }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Package scripts
        run: |
          tar -czf dist/scripts.tar.gz -C scripts .
          sha256sum dist/scripts.tar.gz | awk '{print $1}' > dist/scripts.tar.gz.sha256

      - name: Compute SHA256
        run: |
          sha256sum dist/asset-forge-darwin-arm64 | awk '{print $1}' > dist/asset-forge-darwin-arm64.sha256
          sha256sum dist/asset-forge-darwin-x64   | awk '{print $1}' > dist/asset-forge-darwin-x64.sha256
          sha256sum dist/asset-forge-linux-x64    | awk '{print $1}' > dist/asset-forge-linux-x64.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/asset-forge-darwin-arm64
            dist/asset-forge-darwin-arm64.sha256
            dist/asset-forge-darwin-x64
            dist/asset-forge-darwin-x64.sha256
            dist/asset-forge-linux-x64
            dist/asset-forge-linux-x64.sha256
            dist/scripts.tar.gz
            dist/scripts.tar.gz.sha256
          generate_release_notes: true

  update-formula:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/homebrew-asset-forge
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute SHA256
        run: |
          sha256sum dist/asset-forge-darwin-arm64 | awk '{print $1}' > dist/asset-forge-darwin-arm64.sha256
          sha256sum dist/asset-forge-darwin-x64   | awk '{print $1}' > dist/asset-forge-darwin-x64.sha256
          sha256sum dist/asset-forge-linux-x64    | awk '{print $1}' > dist/asset-forge-linux-x64.sha256
          tar -czf dist/scripts.tar.gz -C scripts .
          sha256sum dist/scripts.tar.gz | awk '{print $1}' > dist/scripts.tar.gz.sha256

      - name: Write formula
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          OWNER="${{ github.repository_owner }}"
          ARM64_SHA=$(cat dist/asset-forge-darwin-arm64.sha256)
          X64_SHA=$(cat dist/asset-forge-darwin-x64.sha256)
          LINUX_SHA=$(cat dist/asset-forge-linux-x64.sha256)
          SCRIPTS_SHA=$(cat dist/scripts.tar.gz.sha256)

          cat > tap/asset-forge.rb <<FORMULA
          class AssetForge < Formula
            desc "The complete asset toolkit for developers"
            homepage "https://github.com/${OWNER}/asset-forge"
            version "${VERSION}"

            depends_on "imagemagick"
            depends_on "ffmpeg"

            on_macos do
              on_arm do
                url "https://github.com/${OWNER}/asset-forge/releases/download/v${VERSION}/asset-forge-darwin-arm64"
                sha256 "${ARM64_SHA}"
              end
              on_intel do
                url "https://github.com/${OWNER}/asset-forge/releases/download/v${VERSION}/asset-forge-darwin-x64"
                sha256 "${X64_SHA}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/${OWNER}/asset-forge/releases/download/v${VERSION}/asset-forge-linux-x64"
                sha256 "${LINUX_SHA}"
              end
            end

            resource "scripts" do
              url "https://github.com/${OWNER}/asset-forge/releases/download/v${VERSION}/scripts.tar.gz"
              sha256 "${SCRIPTS_SHA}"
            end

            def install
              os   = OS.mac? ? "darwin" : "linux"
              arch = Hardware::CPU.arm? ? "arm64" : "x64"
              bin.install "asset-forge-\#{os}-\#{arch}" => "asset-forge"
              bin.install_symlink "asset-forge" => "forge"

              scripts_dir = libexec/"asset-forge/scripts"
              scripts_dir.mkpath
              resource("scripts").stage { scripts_dir.install Dir["*"] }
            end

            def caveats
              <<~EOS
                Two commands require Python packages (not installed automatically):
                  blur-hash:  pip install Pillow blurhash
                  duplicates: pip install Pillow
              EOS
            end

            test do
              assert_match "asset-forge", shell_output("#{bin}/asset-forge --help")
            end
          end
          FORMULA

      - name: Commit and push
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add asset-forge.rb
          git diff --staged --quiet || git commit -m "Update asset-forge to ${VERSION}"
          git push
