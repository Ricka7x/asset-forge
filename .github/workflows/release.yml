name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  update-formula:
    needs: npm-publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/homebrew-asset-forge
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Fetch npm tarball SHA256
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          URL="https://registry.npmjs.org/@ricka7x/asset-forge/-/asset-forge-${VERSION}.tgz"
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then break; fi
            echo "Waiting for npm to propagate... attempt $i"
            sleep 15
          done
          SHA256=$(curl -sL "$URL" | sha256sum | awk '{print $1}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "SHA256=$SHA256" >> $GITHUB_ENV
          echo "TARBALL_URL=$URL" >> $GITHUB_ENV

      - name: Write formula
        run: |
          OWNER="${{ github.repository_owner }}"
          cat > tap/asset-forge.rb <<FORMULA
          class AssetForge < Formula
            desc "The complete asset toolkit for developers"
            homepage "https://github.com/${OWNER}/asset-forge"
            url "${TARBALL_URL}"
            sha256 "${SHA256}"

            depends_on "node"

            def install
              system "npm", "install", *std_npm_args(prefix: libexec)
              bin.install_symlink Dir["#{libexec}/bin/*"]
            end

            test do
              assert_match "the complete asset toolkit", shell_output("#{bin}/asset-forge --help")
            end
          end
          FORMULA

      - name: Commit and push
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add asset-forge.rb
          git diff --staged --quiet || git commit -m "Update asset-forge to ${VERSION}"
          git push
