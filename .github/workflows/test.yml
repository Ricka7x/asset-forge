name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Build and smoke tests
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: npm run build

      - name: Run smoke and package tests
        run: bun test tests/smoke.test.ts tests/pack.test.ts

  integration:
    name: Integration tests
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install system dependencies
        run: brew install imagemagick ffmpeg

      - name: Install dependencies
        run: bun install

      - name: Build
        run: npm run build

      - name: Run integration tests
        run: bun test tests/integration.test.ts
